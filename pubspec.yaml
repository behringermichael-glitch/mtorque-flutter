name: mtorque_flutter
description: "mTORQUE Flutter migration project."
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: ^3.11.3

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  cupertino_icons: ^1.0.8
  change_app_package_name: ^1.5.0
  flutter_riverpod: ^3.0.3
  go_router: ^16.2.4
  intl: ^0.20.2
  http: ^1.6.0
  xml: ^6.6.1
  url_launcher: ^6.3.2
  path_provider: ^2.1.5
  share_plus: ^12.0.1

  drift: ^2.28.2
  sqlite3_flutter_libs: ^0.5.39
  path: ^1.9.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0

  build_runner: ^2.5.4
  drift_dev: ^2.28.1

flutter:
  generate: true
  uses-material-design: true
  assets:
    - assets/images/dashboard/
    - assets/images/exercises/